## アクティブなペインのみ白っぽく変更（真っ黒は232）
# set -g window-style 'bg=colour239'
# set -g window-active-style 'bg=colour232'

# prefixキーをC-jに変更する
set-option -g prefix C-j

# C-bのバインドを解除
unbind C-b
bind-key C-j send-prefix

# キーストロークのディレイ
set -sg escape-time 0

# マウスのスクロールを許可
# setw -g mouse on

# | でペインを縦に分割する
bind | split-window -h

# - でペインを横に分割する
bind - split-window -v

#キーバインドをviにする
setw -g mode-keys vi

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -n S-left select-pane -L
bind -n S-down select-pane -D
bind -n S-up select-pane -U
bind -n S-right select-pane -R

# eで複数ペインを同時に操作(解除はE)
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# 誤って pane を閉じない
bind-key -n C-d run-shell "true"

# == ステータスバーの設定 ==
set-option -g status-left-length 80
set-option -g status-right-length 80

# ステータスバーの文字色を指定する
set-option -g status-fg "#e8dcc8"
set-option -g status-bg "#0d0d0d"

# ステータスバー左側に表示する内容
set-option -g status-left "#[fg=#0d0d0d,bg=#4db8b2,bold] [#S] #[fg=#4db8b2,bg=#2a2825]#{?client_prefix,#[fg=#c4622d]#[bg=#2a2825],#[fg=#e8dcc8]#[bg=#2a2825]} <C-j> #[fg=#2a2825,bg=#0d0d0d]"

# ステータスバー右側に表示する内容
set-option -g status-right "#[fg=#2a2825,bg=#0d0d0d]#[fg=#b0c8a4,bg=#2a2825] CPU: #{cpu_percentage} #[fg=#dfc898,bg=#2a2825]#[fg=#0d0d0d,bg=#dfc898,bold] %Y/%m/%d(%a) %H:%M:%S "

# カレントウィンドウ（白茶アクセント）
set-window-option -g window-status-current-format "#[fg=#2a2825,bg=#0d0d0d]#[fg=#dfc898,bg=#2a2825,bold] #I: #W #[fg=#2a2825,bg=#0d0d0d]"

# 非アクティブウィンドウ
set-window-option -g window-status-format "#[fg=#5a5450,bg=#0d0d0d] #I: #W "

set-option -g status-interval 1
set-option -g default-terminal "xterm-256color"
set -g terminal-overrides 'xterm:colors=256'

# Plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run -b '~/.tmux/plugins/tpm/tpm'
